# LLM provider configuration, follow https://docs.litellm.ai/docs/providers for your own provider config
llm:
  provider: openai              # Options: openai, anthropic, minimax, etc.
  model: gpt-4                 # Model to use for generation, follow litellm model field
  api_key: ${OPENAI_API_KEY}  # Loaded from .env, see .env.example
  api_base: null               # Optional: Custom API endpoint (http:// or https://)
  temperature: 0.7
  max_tokens: 2048

default_agent: rune

# Optional: per-role model tier routing, layered on top of `llm` above.
# Falls back to the single `llm` model when disabled or a role is unset.
# `classify` routes agent_turn by content: a free local pass labels the
# request (daily/coding/reasoning), then that category picks the real tier.
# model_routing:
#   enabled: true
#   tiers:
#     daily:
#       provider: ollama
#       model: hf.co/unsloth/gemma-4-E2B-it-GGUF
#       api_base: http://localhost:11434
#       api_key: "ollama"
