<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rune</title>
<style>
  :root {
    --bg: #0b0b0d;
    --panel: #131315;
    --panel-2: #1a1a1d;
    --border: #262629;
    --text: #e8e6e3;
    --text-dim: #8a8a8e;
    --red: #ef3d3d;
    --red-dim: #7a2323;
    --green: #3ddc84;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .app {
    display: grid;
    grid-template-columns: 1fr 340px;
    height: 100vh;
  }
  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
  }

  /* Chat column */
  .chat-col { display: flex; flex-direction: column; min-width: 0; }
  header {
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  header .mark {
    width: 10px; height: 10px; border-radius: 50%; background: var(--red);
    box-shadow: 0 0 12px var(--red);
  }
  header h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: 0.02em; }
  header span { color: var(--text-dim); font-size: 12px; margin-left: 4px; }

  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 72%; padding: 10px 14px; border-radius: 10px; line-height: 1.45; font-size: 14px; }
  .msg.user { align-self: flex-end; background: var(--red); color: #1a0505; }
  .msg.agent { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); }
  .msg.system { align-self: center; color: var(--text-dim); font-size: 12px; background: none; }

  .composer {
    border-top: 1px solid var(--border); padding: 16px 24px;
    display: flex; gap: 10px;
  }
  .composer input {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 12px 14px; border-radius: 8px; font-size: 14px; outline: none;
  }
  .composer input:focus { border-color: var(--red-dim); }
  .composer button {
    background: var(--red); color: #1a0505; border: none; padding: 0 20px;
    border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  .composer button:disabled { opacity: 0.4; cursor: default; }

  /* Metrics sidebar */
  .side {
    background: var(--panel); border-left: 1px solid var(--border);
    padding: 24px 20px; display: flex; flex-direction: column; gap: 22px; overflow-y: auto;
  }
  .side h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin: 0 0 10px; }

  .meter-card {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
  }
  .meter-bar { height: 10px; border-radius: 6px; background: var(--red-dim); overflow: hidden; margin: 10px 0 6px; }
  .meter-bar > div { height: 100%; background: var(--green); transition: width 0.4s ease; }
  .meter-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); }
  .big-num { font-size: 28px; font-weight: 700; }
  .big-num .unit { font-size: 13px; color: var(--text-dim); font-weight: 400; margin-left: 4px; }

  .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-row .v { color: var(--text-dim); }

  .tier-bar-row { margin-bottom: 10px; }
  .tier-bar-row .tier-label { font-size: 12px; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .tier-track { height: 6px; border-radius: 4px; background: var(--panel-2); overflow: hidden; }
  .tier-track > div { height: 100%; background: var(--red); }

  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
  .dot.ok { background: var(--green); }
  .dot.off { background: var(--text-dim); }
</style>
</head>
<body>
<div class="app">
  <div class="chat-col">
    <header>
      <div class="mark"></div>
      <h1>RUNE</h1>
      <span id="conn-status">connecting…</span>
    </header>
    <div class="messages" id="messages">
      <div class="msg system">Say hello to start.</div>
    </div>
    <div class="composer">
      <input id="input" type="text" placeholder="Message Rune…" autocomplete="off">
      <button id="send">Send</button>
    </div>
  </div>

  <div class="side">
    <div>
      <h2>Token Routing</h2>
      <div class="meter-card">
        <div class="big-num" id="percent-local">0<span class="unit">% served free</span></div>
        <div class="meter-bar"><div id="meter-fill" style="width:0%"></div></div>
        <div class="meter-label"><span id="saved-label">0 saved</span><span id="fireworks-label">0 on Fireworks</span></div>
      </div>
    </div>

    <div>
      <h2>Calls by Tier</h2>
      <div id="tier-bars"></div>
    </div>

    <div>
      <h2>Session</h2>
      <div class="stat-row"><span>Successful calls</span><span class="v" id="calls-success">0</span></div>
      <div class="stat-row"><span>Failed / escalated</span><span class="v" id="calls-error">0</span></div>
    </div>
  </div>
</div>

<script>
const clientId = "web-" + Math.random().toString(36).slice(2, 10);
const messagesEl = document.getElementById("messages");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const connStatus = document.getElementById("conn-status");

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
const ws = new WebSocket(wsProto + "//" + location.host + "/ws");

ws.onopen = () => { connStatus.textContent = ""; connStatus.innerHTML = '<span class="dot ok"></span>connected'; };
ws.onclose = () => { connStatus.innerHTML = '<span class="dot off"></span>disconnected'; };
ws.onerror = () => { connStatus.innerHTML = '<span class="dot off"></span>error'; };

ws.onmessage = (evt) => {
  let data;
  try { data = JSON.parse(evt.data); } catch { return; }
  if (data.type === "OutboundEvent") {
    addMessage("agent", data.content);
    sendBtn.disabled = false;
  } else if (data.type === "error") {
    addMessage("system", data.message || "error");
    sendBtn.disabled = false;
  }
};

function send() {
  const text = input.value.trim();
  if (!text || ws.readyState !== WebSocket.OPEN) return;
  addMessage("user", text);
  ws.send(JSON.stringify({ source: clientId, content: text }));
  input.value = "";
  sendBtn.disabled = true;
}

sendBtn.addEventListener("click", send);
input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

function fmt(n) {
  n = Math.round(n);
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
  if (n >= 1_000) return (n / 1_000).toFixed(1) + "k";
  return String(n);
}

async function pollMetrics() {
  try {
    const res = await fetch("/metrics/summary");
    const m = await res.json();

    document.getElementById("percent-local").innerHTML = m.percent_local + '<span class="unit">% served free</span>';
    document.getElementById("meter-fill").style.width = m.percent_local + "%";
    document.getElementById("saved-label").textContent = fmt(m.saved_tokens) + " saved";
    document.getElementById("fireworks-label").textContent = fmt(m.fireworks_tokens) + " on Fireworks";
    document.getElementById("calls-success").textContent = fmt(m.calls_success);
    document.getElementById("calls-error").textContent = fmt(m.calls_error);

    const tierBars = document.getElementById("tier-bars");
    tierBars.innerHTML = "";
    const entries = Object.entries(m.calls_by_tier || {});
    const max = Math.max(1, ...entries.map(([, v]) => v));
    for (const [tier, count] of entries) {
      const row = document.createElement("div");
      row.className = "tier-bar-row";
      row.innerHTML = `
        <div class="tier-label"><span>${tier}</span><span>${fmt(count)}</span></div>
        <div class="tier-track"><div style="width:${(count / max) * 100}%"></div></div>`;
      tierBars.appendChild(row);
    }
  } catch (e) { /* server not up yet */ }
}

pollMetrics();
setInterval(pollMetrics, 2000);
</script>
</body>
</html>
